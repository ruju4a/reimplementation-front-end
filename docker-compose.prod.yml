# Production build: API URL is baked in at build time (Vite).
#
# Create .env.production in this directory:
#   VITE_API_BASE_URL=http://YOUR_VCL_PUBLIC_IP:3002
#
# Then:
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: expertiza-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
